<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
  #board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; width: max-content; margin: 0 auto; }
  .cell { width: 100px; height: 100px; font-size: 2em; display: flex; justify-content: center; align-items: center; border: 1px solid #333; cursor: pointer; }
  #status { margin-top: 20px; font-size: 1.2em; }
  button { margin-top: 20px; }
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div id="board"></div>
<div id="status"></div>
<button id="reset">Reset</button>
<script>
const boardElem = document.getElementById('board');
const statusElem = document.getElementById('status');
const resetBtn = document.getElementById('reset');
let board = Array(9).fill(null);
let currentPlayer = 'X';
const winningCombos = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];
function render() {
  boardElem.innerHTML = '';
  board.forEach((val, idx) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = val || '';
    cell.addEventListener('click', () => move(idx));
    boardElem.appendChild(cell);
  });
  statusElem.textContent = `Current player: ${currentPlayer}`;
}
function move(idx) {
  if (board[idx] || checkWinner()) return;
  board[idx] = currentPlayer;
  if (checkWinner()) {
    statusElem.textContent = `${currentPlayer} wins!`;
  } else if (board.every(Boolean)) {
    statusElem.textContent = 'Draw!';
  } else {
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    statusElem.textContent = `Current player: ${currentPlayer}`;
  }
  render();
}
function checkWinner() {
  return winningCombos.some(combo => {
    const [a,b,c] = combo;
    return board[a] && board[a] === board[b] && board[a] === board[c];
  });
}
resetBtn.addEventListener('click', () => {
  board = Array(9).fill(null);
  currentPlayer = 'X';
  statusElem.textContent = `Current player: ${currentPlayer}`;
  render();
});
render();
</script>
</body>
</html>
